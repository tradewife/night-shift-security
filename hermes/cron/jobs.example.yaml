# Night Shift Security — Hermes cron recipes
# Apply with night-shift profile after: ./hermes/install-profile.sh, or install
# into the authenticated nightsoul profile with ./hermes/install-nightsoul-overlay.sh
# and equivalent `hermes --profile nightsoul cron create ...` commands.
# Requires: Hermes gateway/OAuth under the active cron profile.
#
# Primary (SPEC v4.1.0): nss-hipif-chain — one full no-agent chain per night
# (scan → semantic recon/concrete candidates → self-interrogation → Wormhole depth → bridge refinement
# → KLend live preflight/v2 artifacts → KLend depth → Cantina slates → hunt
# → failure-trace RSI → refine → coordinator → journal → gate).
# Bootstrap sets NSS_HIPIF_BOUNTY_DEPTH=1 and NSS_KLEND_FIXTURE=0 by default.
# No LLM/OAuth is required for the primary job when run in no-agent deterministic mode.
#
# Default NSS_HIPIF_MODE=deterministic: full v4.1 runner through final HIPIF gate.
# Optional interactive mode: NSS_HIPIF_MODE=hybrid.
# Completion gate: hipif gate (13 folds required)

profile: night-shift
workdir: /home/kt/projects/rtp/night-shift-security
deliver: local

jobs:
  - name: nss-health
    schedule: "every 6h"
    mode: no-agent
    script: nss-health.sh

  - name: nss-hipif-chain
    schedule: "0 4 * * *"
    mode: no-agent
    script: nss-hipif-chain.sh
    # Live apply:
    # hermes --profile nightsoul cron edit 343324bfcbb2 --no-agent --clear-skills --script nss-hipif-chain.sh

  - name: nss-immunefi-scan
    schedule: "0 6 * * 3,6"
    skill: immunefi-scan
    prompt: |
      Run Immunefi Solana scan per immunefi-scan skill. Optionally platform sync --all.
      Read latest.md and summarize top targets and catalogue analogue matches. Write digest to
      data/security_results/immunefi_scan/hermes-digest-latest.md

  # DEPRECATED (absorbed into nss-hipif-chain):
  # - nss-investigate-queue
  # - nss-coordinator-kamino
  # - nss-bounty-loop (replaced by nss-hipif-chain)

  - name: nss-novel-digest
    schedule: "every 3d"
    skill: novel-vector-digest
    prompt: |
      Weekly novel vector digest per novel-vector-digest skill.

  - name: nss-campaign-review
    schedule: "0 9 * * 0"
    skill: knowledge-campaign
    prompt: |
      Monthly campaign review for kamino-immunefi-2026-06 per knowledge-campaign skill.

# CLI equivalents:
#
# hermes --profile nightsoul cron create "0 4 * * *" \
#   --script nss-hipif-chain.sh --no-agent --name nss-hipif-chain \
#   --workdir /home/kt/projects/rtp/night-shift-security --deliver local
