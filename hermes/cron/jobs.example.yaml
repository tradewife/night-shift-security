# Night Shift Security — Hermes cron recipes
# Apply with night-shift profile after: ./hermes/install-profile.sh
# Requires: hermes gateway install (under night-shift profile)
#
# Primary (SPEC v3.3.0): nss-hipif-chain — one consecutive agent chain per night
# (scan → Wormhole depth → bridge refinement → KLend live preflight → KLend depth
# → Cantina slates → hunt → RSI → refine → coordinator → journal → gate).
# Bootstrap sets NSS_HIPIF_BOUNTY_DEPTH=1 and NSS_KLEND_FIXTURE=0 by default.
# Requires xAI OAuth: hermes --profile night-shift model
#
# Default NSS_HIPIF_MODE=hybrid: deterministic bulk depth then agent intelligence subgoals.
# Emergency no-agent fallback: NSS_HIPIF_MODE=deterministic
# Completion gate: hipif gate (13 folds required)

profile: night-shift
workdir: /home/kt/projects/rtp/night-shift-security
deliver: local

jobs:
  - name: nss-health
    schedule: "every 6h"
    mode: no-agent
    script: nss-health.sh

  - name: nss-hipif-chain
    schedule: "0 4 * * *"
    skills:
      - hipif
      - bounty-loop
      - hypothesis-expansion
      - recursive-improvement
      - coordinator-cycle
      - operator-triage
      - lab-notebook
      - operator-submit
    script: nss-hipif-chain.sh
    prompt_file: hermes/cron/nss-hipif-chain.prompt.md
    # Live apply: hermes --profile night-shift cron edit fbe84e39c1b1 --agent ...

  - name: nss-immunefi-scan
    schedule: "0 6 * * 3,6"
    skill: immunefi-scan
    prompt: |
      Run Immunefi Solana scan per immunefi-scan skill. Optionally platform sync --all.
      Read latest.md and summarize top targets and catalogue analogue matches. Write digest to
      data/security_results/immunefi_scan/hermes-digest-latest.md

  # DEPRECATED (absorbed into nss-hipif-chain):
  # - nss-investigate-queue
  # - nss-coordinator-kamino
  # - nss-bounty-loop (replaced by nss-hipif-chain)

  - name: nss-novel-digest
    schedule: "every 3d"
    skill: novel-vector-digest
    prompt: |
      Weekly novel vector digest per novel-vector-digest skill.

  - name: nss-campaign-review
    schedule: "0 9 * * 0"
    skill: knowledge-campaign
    prompt: |
      Monthly campaign review for kamino-immunefi-2026-06 per knowledge-campaign skill.

# CLI equivalents:
#
# hermes --profile night-shift cron create "0 4 * * *" \
#   "Execute HIPIF night chain per hipif skill" \
#   --skill hipif --script nss-hipif-chain.sh --name nss-hipif-chain \
#   --profile night-shift --workdir /home/kt/projects/rtp/night-shift-security --deliver local
#
# OAuth before first run:
#   hermes --profile night-shift model