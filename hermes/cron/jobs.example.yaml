# Night Shift Security — Hermes cron recipes
# Apply with night-shift profile after: ./hermes/install-profile.sh
# Requires: hermes gateway install (under night-shift profile)
#
# Ramp-up (measure effectiveness in ~2 weeks):
#   nss-kamino-shoestring: every 2d
#   nss-novel-digest: every 3d
#   nss-campaign-review: 0 9 * * 0  (weekly, not monthly)
#   nss-immunefi-scan: 0 6 * * 3,6  (Wed + Sat)
#
# Steady-state (after ramp-up): bounty-loop daily 04:00, Kamino Wed 03:00,
# novel digest every 3d, campaign review Sun 09:00, immunefi Wed/Sat 06:00
#
# Registered on this machine (2026-06-13): nss-bounty-loop fbe84e39c1b1
# Prompt aligned SPEC v3.0.8 (2026-06-13): KLend clone depth + Wormhole pauser-auth fork

profile: night-shift
workdir: /home/kt/projects/rtp/night-shift-security
deliver: local

jobs:
  - name: nss-health
    schedule: "every 6h"
    mode: no-agent
    script: nss-health.sh

  - name: nss-immunefi-scan
    schedule: "0 6 * * 3,6"
    skill: immunefi-scan
    prompt: |
      Run Immunefi Solana scan per immunefi-scan skill. Read latest.md and summarize
      top targets and catalogue analogue matches. Write digest to
      data/security_results/immunefi_scan/hermes-digest-latest.md

  - name: nss-bounty-loop
    schedule: "0 4 * * *"
    skills:
      - bounty-loop
      - recursive-improvement
      - lab-notebook
    prompt: |
      Primary autonomous hunt (SPEC v3.0.8). Run nss-bounty-loop.sh --iterations 1 --refresh-scan
      (script git-pulls then bounty loop). Kamino: klend_require_live + CLONED_DATA_ACCOUNTS from
      klend_accounts.json. Wormhole: wormhole_triage.json — governance + pauser-auth fork targets.
      submit_ready requires live_executed KLend with balance delta or balance_verified Wormhole fork —
      governance/pause smoke alone is NOT submittable. RSI inline; check improvement_ledger.jsonl +
      refinement_hints.json. If submission_alert.json (submit_ready): hard stop, alert human — never
      post externally. Mandatory lab-notebook: slug, RSI, saturated_slugs delta, same vs different,
      plus CLONED_DATA_ACCOUNTS or BRIDGE_PAUSE_AUTH when Kamino/Wormhole ran.

  - name: nss-investigate-queue
    schedule: "0 5 * * 0"
    skills:
      - coordinator-cycle
      - recursive-improvement
      - hypothesis-expansion
      - lab-notebook
    prompt: |
      Weekly Kamino depth pass (bounty loop owns daily cross-platform rotation).
      coordinator plan --top 1 → scoped hypothesis-expansion → coordinator cycle.
      If refinement_hints.json targets Kamino, use nss-write-proposals.py before cycle.
      Mandatory lab-notebook. Do not duplicate bounty-loop saturated slugs.

  - name: nss-coordinator-kamino
    schedule: "0 3 * * 3"
    skill: coordinator-cycle
    prompt: |
      Kamino campaign coordinator-cycle only: plan --top 1 → scoped hypothesis-expansion →
      coordinator cycle → lab-notebook. Never [SILENT] without notebook entry.

  - name: nss-novel-digest
    schedule: "every 3d"
    skill: novel-vector-digest
    prompt: |
      Weekly novel vector digest per novel-vector-digest skill.

  - name: nss-campaign-review
    schedule: "0 9 * * 0"
    skill: knowledge-campaign
    prompt: |
      Monthly campaign review for kamino-immunefi-2026-06 per knowledge-campaign skill.

# CLI equivalents:
#
# hermes --profile night-shift cron create "every 6h" \
#   --no-agent --script nss-health.sh --name nss-health \
#   --profile night-shift --workdir /home/kt/projects/rtp/night-shift-security --deliver local
#
# hermes --profile night-shift cron create "0 6 * * 1" \
#   "Run Immunefi scan per immunefi-scan skill" \
#   --skill immunefi-scan --name nss-immunefi-scan \
#   --profile night-shift --workdir /home/kt/projects/rtp/night-shift-security --deliver local