# Night Shift Security — Hermes cron recipes
# Apply with night-shift profile after: ./hermes/install-profile.sh
# Requires: hermes gateway install (under night-shift profile)
#
# Ramp-up (measure effectiveness in ~2 weeks):
#   nss-kamino-shoestring: every 2d
#   nss-novel-digest: every 3d
#   nss-campaign-review: 0 9 * * 0  (weekly, not monthly)
#   nss-immunefi-scan: 0 6 * * 3,6  (Wed + Sat)
#
# Steady-state (after ramp-up): Kamino weekly Wed 03:00, novel Sun 08:00,
# campaign monthly 1st 09:00, immunefi Mon 06:00

profile: night-shift
workdir: /home/kt/projects/rtp/night-shift-security
deliver: local

jobs:
  - name: nss-health
    schedule: "every 6h"
    mode: no-agent
    script: nss-health.sh

  - name: nss-immunefi-scan
    schedule: "0 6 * * 3,6"
    skill: immunefi-scan
    prompt: |
      Run Immunefi Solana scan per immunefi-scan skill. Read latest.md and summarize
      top targets and catalogue analogue matches. Write digest to
      data/security_results/immunefi_scan/hermes-digest-latest.md

  - name: nss-investigate-queue
    schedule: "every 2d"
    skills:
      - immunefi-scan
      - hypothesis-expansion
      - investigate-from-scan
    prompt: |
      Scan Solana Immunefi programs, then deep-dive top 2 ranked targets (not Kamino-only).
      Follow immunefi-scan → hypothesis-expansion → investigate-from-scan skills.
      Triage findings grade >= 3. Push to main only if pytest passes (SOUL policy).

  - name: nss-novel-digest
    schedule: "every 3d"
    skill: novel-vector-digest
    prompt: |
      Weekly novel vector digest per novel-vector-digest skill.

  - name: nss-campaign-review
    schedule: "0 9 * * 0"
    skill: knowledge-campaign
    prompt: |
      Monthly campaign review for kamino-immunefi-2026-06 per knowledge-campaign skill.

# CLI equivalents:
#
# hermes --profile night-shift cron create "every 6h" \
#   --no-agent --script nss-health.sh --name nss-health \
#   --profile night-shift --workdir /home/kt/projects/rtp/night-shift-security --deliver local
#
# hermes --profile night-shift cron create "0 6 * * 1" \
#   "Run Immunefi scan per immunefi-scan skill" \
#   --skill immunefi-scan --name nss-immunefi-scan \
#   --profile night-shift --workdir /home/kt/projects/rtp/night-shift-security --deliver local