[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 20000
evm_version = "cancun"
remappings = [
    "lib/openzeppelin-contracts/contracts/=src/variational/lib/openzeppelin-contracts/contracts/",
]

[profile.kiln]
src = "src/kiln"
out = "out/kiln"
libs = ["lib"]
solc = "0.8.22"
optimizer = true
optimizer_runs = 200
# Shanghai EVM matches the deployed bytecode's compilation target.
evm_version = "shanghai"
# Remapping strategy:
#  - `@openzeppelin/<X>.sol` resolves to `contracts/<X>.sol`   (non-upgradeable)
#  - `@openzeppelin/contracts/<X>.sol` resolves to
#    `contracts/contracts-meta/<X>.sol` which is a symlink mirror of `contracts/`
#    (covers upgradeable OZ's internal imports of non-upgradeable parents).
#  - `@openzeppelin-upgradeable/<X>.sol` resolves to
#    `contracts/contracts-upgradeable-overlay/<X>.sol` (upgradeable OZ mirror).
#
# This avoids the doubled path issue. Kiln source uses
# `@openzeppelin/<X>` for non-upgradeable parents and
# `@openzeppelin-upgradeable/<X>` for upgradeable parents.
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-upgradeable/=lib/openzeppelin-contracts/contracts/",
]

[profile.bitgo]
src = "src/bitgo"
test = "test/bitgo"
out = "out/bitgo"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "contracts/=src/bitgo/contracts/",
]
allow_paths = ["../../sources/bitgo-eth-multisig/repo/contracts"]

[profile.superform]
src = "src/superform"
test = "src/superform"
out = "out/superform"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[profile.redstone]
src = "src/redstone"
test = "src/redstone"
out = "out/redstone"
libs = ["lib", "../sources/redstone/repo/packages/evm-connector"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "london"
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@redstone-finance/evm-connector/=../sources/redstone/repo/packages/evm-connector/",
    "@redstone-finance/evm-adapters/=../sources/redstone/repo/packages/evm-adapters/",
    "@redstone-finance/erc7412/=../sources/redstone/repo/packages/erc7412/",
]
allow_paths = [
    "../sources/redstone/repo/packages/",
    "../sources/redstone/repo/",
]
auto_detect_remappings = false

